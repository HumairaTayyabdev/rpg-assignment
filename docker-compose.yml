services:
  postgres:
    image: postgres:16-alpine
    container_name: rpg-assignment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rpg_user
      POSTGRES_PASSWORD: rpg_password
      POSTGRES_DB: rpg_blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rpg-assignment-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
